<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafaf9"/>
      <stop offset="100%" style="stop-color:#f5f5f4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="#e7e5e4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.7"/>

  <!-- Amber accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="#d97706"/>

  <!-- Logo mark (B + dome cap) -->
  <text x="120" y="265" font-family="Inter,system-ui,sans-serif" font-size="80" font-weight="800" fill="#d97706">B</text>
  <path d="M120 216 Q120 196 142 196 Q164 196 164 216 Z" fill="#d97706"/>

  <!-- Logo text -->
  <text x="210" y="265" font-family="Inter,system-ui,sans-serif" font-size="72" font-weight="800" fill="#1c1917">Bottle</text>
  <text x="210" y="350" font-family="Inter,system-ui,sans-serif" font-size="72" font-weight="800" fill="#d97706">Finder</text>

  <!-- Tagline -->
  <text x="120" y="430" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="400" fill="#78716c">Answer 7 quick questions.</text>
  <text x="120" y="475" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="400" fill="#78716c">Get your perfect water bottle.</text>

  <!-- Right side decorative circles (abstract bottles) -->
  <circle cx="920" cy="315" r="200" fill="#fef3c7" opacity="0.6"/>
  <circle cx="1080" cy="200" r="120" fill="#fde68a" opacity="0.4"/>
  <circle cx="780" cy="450" r="100" fill="#fde68a" opacity="0.3"/>

  <!-- Bottle silhouette 1 -->
  <rect x="850" y="150" width="60" height="160" rx="12" fill="#d97706" opacity="0.8"/>
  <rect x="860" y="130" width="40" height="25" rx="6" fill="#d97706" opacity="0.8"/>
  <rect x="865" y="115" width="30" height="18" rx="4" fill="#b45309" opacity="0.8"/>

  <!-- Bottle silhouette 2 -->
  <rect x="960" y="170" width="50" height="140" rx="10" fill="#92400e" opacity="0.5"/>
  <rect x="968" y="152" width="34" height="22" rx="5" fill="#92400e" opacity="0.5"/>
  <rect x="972" y="138" width="26" height="16" rx="3" fill="#78350f" opacity="0.5"/>

  <!-- Bottle silhouette 3 -->
  <rect x="1040" y="190" width="55" height="150" rx="11" fill="#d97706" opacity="0.35"/>
  <rect x="1049" y="172" width="37" height="22" rx="5" fill="#d97706" opacity="0.35"/>

  <!-- URL -->
  <text x="120" y="570" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="500" fill="#a8a29e">bottlefinder.netlify.app</text>
</svg>
