<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bottle cap -->
  <rect x="12" y="2" width="8" height="4" rx="1.5" fill="#f59e0b"/>
  <!-- Bottle neck -->
  <rect x="13" y="6" width="6" height="4" rx="1" fill="#f59e0b"/>
  <!-- Bottle body -->
  <rect x="8" y="10" width="16" height="18" rx="4" fill="#f59e0b"/>
  <!-- Water fill (lighter tint inside) -->
  <rect x="10" y="16" width="12" height="10" rx="2" fill="#fbbf24" opacity="0.5"/>
  <!-- Highlight shine -->
  <rect x="11" y="12" width="3" height="7" rx="1.5" fill="white" opacity="0.3"/>
</svg>
